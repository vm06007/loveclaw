<script>
  // ── Starfield ─────────────────────────────────────
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    const a1 = (Math.random() * 0.3 + 0.1).toFixed(2);
    const a2 = (Math.random() * 0.6 + 0.3).toFixed(2);
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*65}%;
      width:${sz}px; height:${sz}px;
      --d:${(Math.random()*3+2).toFixed(1)}s;
      --del:${(Math.random()*4).toFixed(1)}s;
      --a1:${a1}; --a2:${a2};
    `;
    sf.appendChild(s);
  }

  // ── Starfield parallax (pointer vs. stage center; stars move slower = depth) ──
  (function initStarfieldParallax() {
    const stage = document.querySelector(".stage");
    if (!stage || !sf || window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      return;
    }
    const strength = 24;
    const ease = 0.14;
    let targetX = 0;
    let targetY = 0;
    let curX = 0;
    let curY = 0;
    let rafId = 0;

    function setTargets(clientX, clientY) {
      const r = stage.getBoundingClientRect();
      const halfW = Math.max(r.width * 0.5, 1);
      const halfH = Math.max(r.height * 0.5, 1);
      let nx = (clientX - (r.left + r.width * 0.5)) / halfW;
      let ny = (clientY - (r.top + r.height * 0.5)) / halfH;
      nx = Math.max(-1.15, Math.min(1.15, nx));
      ny = Math.max(-1.15, Math.min(1.15, ny));
      targetX = -nx * strength;
      targetY = -ny * strength;
    }

    function tick() {
      rafId = 0;
      curX += (targetX - curX) * ease;
      curY += (targetY - curY) * ease;
      sf.style.transform = "translate3d(" + curX.toFixed(2) + "px," + curY.toFixed(2) + "px,0)";
      if (Math.abs(targetX - curX) > 0.04 || Math.abs(targetY - curY) > 0.04) {
        rafId = requestAnimationFrame(tick);
      }
    }

    function scheduleTick() {
      if (!rafId) {
        rafId = requestAnimationFrame(tick);
      }
    }

    function onPointerMove(e) {
      if (e.pointerType === "mouse" || e.pointerType === "pen") {
        setTargets(e.clientX, e.clientY);
        scheduleTick();
      }
    }

    setTargets(window.innerWidth * 0.5, window.innerHeight * 0.5);
    document.addEventListener("pointermove", onPointerMove, { passive: true });
  })();
</script>
<script>
    (function () {
        var nav = document.getElementById("welcome-top-menu");
        var hamburger = document.getElementById("welcome-nav-hamburger");
        var backdrop = document.getElementById("welcome-top-mobile-backdrop");
        if (!nav) {
            return;
        }
        var mqMobile = window.matchMedia("(max-width: 640px)");
        var topStripPx = 56;
        var topStrip = false;
        var navHover = false;
        var mobileMenuOpen = false;

        function isMobileLayout() {
            return mqMobile.matches;
        }

        function refreshTopStripPx() {
            topStripPx = Math.min(100, Math.round(window.innerHeight * 0.14));
        }

        function forceClose() {
            topStrip = false;
            navHover = false;
            mobileMenuOpen = false;
            syncTopNav();
        }

        function syncTopNav() {
            var open;
            if (isMobileLayout()) {
                topStrip = false;
                navHover = false;
                open = mobileMenuOpen;
                if (hamburger) {
                    hamburger.setAttribute("aria-expanded", open ? "true" : "false");
                    hamburger.classList.toggle("welcome-nav-hamburger--open", open);
                }
                if (backdrop) {
                    backdrop.classList.toggle("is-visible", open);
                    backdrop.setAttribute("aria-hidden", open ? "false" : "true");
                }
            } else {
                mobileMenuOpen = false;
                if (backdrop) {
                    backdrop.classList.remove("is-visible");
                    backdrop.setAttribute("aria-hidden", "true");
                }
                if (hamburger) {
                    hamburger.setAttribute("aria-expanded", "false");
                    hamburger.classList.remove("welcome-nav-hamburger--open");
                }
                open = topStrip || navHover;
            }
            nav.classList.toggle("welcome-top-menu--open", open);
            nav.setAttribute("aria-hidden", open ? "false" : "true");
            var arrowTop = document.querySelector(".hero-scroll-hint--top");
            if (arrowTop) arrowTop.style.opacity = open ? "0" : "";
        }

        function onMouseMove(e) {
            if (isMobileLayout()) {
                return;
            }
            topStrip = e.clientY <= topStripPx;
            syncTopNav();
        }

        refreshTopStripPx();
        document.addEventListener("mousemove", onMouseMove, { passive: true });
        window.addEventListener(
            "resize",
            function () {
                refreshTopStripPx();
                syncTopNav();
            },
            { passive: true }
        );
        if (typeof mqMobile.addEventListener === "function") {
            mqMobile.addEventListener("change", syncTopNav);
        } else if (typeof mqMobile.addListener === "function") {
            mqMobile.addListener(syncTopNav);
        }

        nav.addEventListener("mouseenter", function () {
            navHover = true;
            syncTopNav();
        });
        nav.addEventListener("mouseleave", function () {
            navHover = false;
            syncTopNav();
        });

        if (hamburger) {
            hamburger.addEventListener("click", function () {
                if (!isMobileLayout()) {
                    return;
                }
                mobileMenuOpen = !mobileMenuOpen;
                syncTopNav();
            });
        }
        if (backdrop) {
            backdrop.addEventListener("click", forceClose);
        }

        nav.addEventListener("click", function (e) {
            if (!isMobileLayout()) {
                return;
            }
            if (e.target.closest("a.btn--prefill")) {
                mobileMenuOpen = false;
                syncTopNav();
            }
        });

        window.addEventListener("welcome-top-nav-force-close", forceClose);

        document.addEventListener("keydown", function (e) {
            if (e.key !== "Escape") {
                return;
            }
            if (!isMobileLayout() || !mobileMenuOpen) {
                return;
            }
            forceClose();
        });

        syncTopNav();
    })();
</script>
<script>
    (function () {
        var panel = document.querySelector(".device-tag-panel");
        if (!panel) {
            return;
        }
        var heart = document.querySelector(".thread-svg .heart");
        var STRIP_PX = 200;
        var bottomStrip = false;
        var panelHover = false;
        var heartLatched = false;

        function refreshStripPx() {
            STRIP_PX = Math.min(220, Math.round(window.innerHeight * 0.28));
        }

        function dockOpen() {
            return heartLatched || bottomStrip || panelHover;
        }

        function syncDock() {
            var open = dockOpen();
            panel.classList.toggle("device-tag-panel--open", open);
            panel.setAttribute("aria-hidden", open ? "false" : "true");
            var arrowBottom = document.querySelector(".hero-scroll-hint:not(.hero-scroll-hint--top)");
            if (arrowBottom) arrowBottom.style.opacity = open ? "0" : "";
        }

        function onMove(e) {
            bottomStrip = window.innerHeight - e.clientY <= STRIP_PX;
            syncDock();
        }

        refreshStripPx();
        document.addEventListener("mousemove", onMove, { passive: true });
        window.addEventListener("resize", refreshStripPx, { passive: true });

        panel.addEventListener("mouseenter", function () {
            panelHover = true;
            syncDock();
        });
        panel.addEventListener("mouseleave", function () {
            panelHover = false;
            syncDock();
        });

        function toggleHeartLatch() {
            heartLatched = !heartLatched;
            if (heart) {
                heart.classList.toggle("heart--latched", heartLatched);
                heart.setAttribute("aria-pressed", heartLatched ? "true" : "false");
            }
            syncDock();
        }

        if (heart) {
            heart.addEventListener("click", function (e) {
                e.preventDefault();
                e.stopPropagation();
                toggleHeartLatch();
            });
            heart.addEventListener("keydown", function (e) {
                if (e.key === "Enter" || e.key === " ") {
                    e.preventDefault();
                    toggleHeartLatch();
                }
            });
            window.setTimeout(function () {
                heart.classList.add("heart--ready");
            }, 3100);
        }
    })();
</script>
<script>
    (function () {
        var TAG_RE = /^[a-zA-Z0-9_-]{1,48}$/;
        var toastEl = document.getElementById("tag-toast");
        var toastTimer;
        function normalize(s) {
            return String(s || "").trim().toLowerCase();
        }
        function hideToast() {
            toastEl.classList.remove("is-visible");
            toastEl.textContent = "";
            toastEl.setAttribute("aria-hidden", "true");
        }
        function showToast(msg) {
            if (!msg) {
                return;
            }
            clearTimeout(toastTimer);
            toastEl.setAttribute("aria-hidden", "false");
            toastEl.textContent = msg;
            requestAnimationFrame(function () {
                toastEl.classList.add("is-visible");
            });
            toastTimer = setTimeout(hideToast, 4200);
        }
        toastEl.addEventListener("click", function () {
            clearTimeout(toastTimer);
            hideToast();
        });
        function go(tag, inputEl) {
            var t = normalize(tag);
            if (!t) {
                showToast("Enter your name, then tap OPEN.");
                if (inputEl) {
                    inputEl.focus();
                }
                return;
            }
            if (!TAG_RE.test(t)) {
                showToast("Use letters, numbers, _ or - only (1 to 48 characters).");
                if (inputEl) {
                    inputEl.focus();
                }
                return;
            }
            var url = "/" + encodeURIComponent(t);
            var w = window.open(url, "_blank");
            if (w) {
                w.opener = null;
            }
        }
        var form = document.getElementById("tag-form");
        var input = document.getElementById("tag-input");
        form.addEventListener("submit", function (e) {
            e.preventDefault();
            go(input.value, input);
        });
        document.querySelectorAll(".device-tag-panel .prefills [data-tag]").forEach(function (el) {
            el.addEventListener("click", function () {
                var v = el.getAttribute("data-tag") || "";
                input.value = v;
                input.focus();
            });
        });
    })();
</script>
