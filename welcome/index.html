<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveClaw — Commit · Protect · Remember</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:    #5DCAA5;
    --teal-d:  #1D9E75;
    --purple:  #534AB7;
    --purple-l:#AFA9EC;
    --pink:    #D4537E;
    --pink-l:  #ED93B1;
    --amber:   #FAC775;
    --red:     #E24B4A;
    --bg:      #07070f;
    --bg2:     #0d0d1e;
    --bg3:     #111128;
    --border:  #1a1a3a;
    --muted:   #444466;
    --gray:    #888780;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  /* ── SLIDE CONTAINER ─────────────────────────────── */
  .stage {
    position: fixed; inset: 0;
    background: #05050f;
    overflow: hidden;
    animation: crtFlicker 6s infinite;
  }
  @keyframes crtFlicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.92; }
    94% { opacity: 1; }
  }

  /* starfield */
  .star {
    position: absolute; border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) var(--del, 0s) ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: var(--a1, 0.2); } to { opacity: var(--a2, 0.8); } }

  /* city skyline */
  .skyline {
    position: absolute; bottom: 0; left: 0; right: 0;
    width: 100%;
    height: 200px;
    image-rendering: pixelated;
    display: block;
  }

  /* glow thread */
  .thread-svg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .thread-path {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: drawLine 2s 0.8s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }

  /* ── PIXEL HEART ──────────────────────────────────
     Positioned at arc midpoint (500, 255) in the
     1000×600 thread-svg viewBox. Appears at t = 2.8s
     (exactly when the arc finishes drawing), then
     pulses forever.
  ──────────────────────────────────────────────────── */
  .heart {
    opacity: 0;
    transform-origin: 500px 255px;
    transform-box: view-box;
    animation:
      heartAppear 0.7s 2.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
      heartBeat 1.6s 3.6s infinite;
  }
  @keyframes heartAppear {
    0%   { opacity: 0; transform: scale(0) rotate(-12deg); }
    60%  { opacity: 1; transform: scale(2.6) rotate(0deg); }
    100% { opacity: 1; transform: scale(2) rotate(0deg); }
  }
  @keyframes heartBeat {
    0%, 100% { transform: scale(2); }
    14%      { transform: scale(2.28); }
    28%      { transform: scale(2); }
    42%      { transform: scale(2.16); }
    70%      { transform: scale(2); }
  }
  /* soft aura behind the heart — also appears at 2.8s */
  .heart-aura {
    opacity: 0;
    transform-origin: 500px 255px;
    transform-box: view-box;
    animation:
      auraIn 0.9s 2.8s ease forwards,
      auraPulse 1.6s 3.6s ease-in-out infinite;
  }
  @keyframes auraIn {
    0%   { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(2); }
  }
  @keyframes auraPulse {
    0%, 100% { opacity: 0.45; transform: scale(2); }
    50%      { opacity: 0.8;  transform: scale(2.5); }
  }

  /* phones */
  .phone-left, .phone-right {
    position: absolute;
    animation: phoneRise 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
  }
  .phone-left  { left: calc(50% - 270px); top: calc(50% - 110px); animation-delay: 0.1s; }
  .phone-right { right: calc(50% - 270px); top: calc(50% - 110px); animation-delay: 0.3s; }
  @keyframes phoneRise {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* hero text */
  .hero-title {
    position: absolute; bottom: 190px; left: 50%; transform: translateX(-50%);
    text-align: center; white-space: nowrap;
    animation: fadeUp 0.8s 0.5s ease forwards; opacity: 0;
  }
  .hero-title h1 {
    font-size: clamp(24px, 4vw, 40px);
    color: white; letter-spacing: 4px;
    text-shadow: 0 0 24px rgba(212,83,126,.18), 0 0 40px rgba(93,202,165,.1);
  }
  .hero-title p  {
    font-size: clamp(7px, 1vw, 10px);
    color: var(--teal);
    letter-spacing: 3px; margin-top: 10px;
  }
  .hero-sub {
    position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%);
    font-size: 7px; color: var(--purple-l); letter-spacing: 2px; white-space: nowrap;
    animation: fadeUp 0.8s 0.8s ease forwards; opacity: 0;
  }
  .hero-tags {
    position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
    font-size: 7px; color: var(--muted); letter-spacing: 2px; white-space: nowrap;
    animation: fadeUp 0.8s 1.1s ease forwards; opacity: 0;
  }
  .hero-tags span { color: var(--purple-l); }
  .hero-tags i { color: var(--muted); font-style: normal; margin: 0 6px; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(16px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* scan line effect */
  .scanlines {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
    );
  }

  /* window light flicker in buildings */
  .win { animation: winFlicker var(--d,4s) var(--del,0s) ease-in-out infinite alternate; }
  @keyframes winFlicker { 0%,100%{opacity:var(--a,0.7)} 50%{opacity:calc(var(--a,0.7)*0.4)} }

  /* corner brackets */
  .corner {
    position: fixed; width: 22px; height: 22px;
    border-color: var(--teal); border-style: solid;
    z-index: 40; pointer-events: none;
    animation: fadeIn 0.6s 1.3s ease forwards; opacity: 0;
  }
  .corner.tl { top: 18px; left: 18px;  border-width: 2px 0 0 2px; }
  .corner.tr { top: 18px; right: 18px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 18px; left: 18px;  border-width: 0 0 2px 2px; }
  .corner.br { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; }
  @keyframes fadeIn { to { opacity: 1; } }

  /* top-left status tag + top-right slide label */
  .tag-l { position: fixed; top: 22px; left: 46px; font-size: 7px; color: var(--muted); letter-spacing: 2px; z-index: 40; animation: fadeIn 0.6s 1.5s ease forwards; opacity: 0; }
  .tag-l b { color: var(--teal); font-weight: normal; }
  .tag-r { position: fixed; top: 22px; right: 46px; font-size: 7px; color: var(--muted); letter-spacing: 2px; z-index: 40; animation: fadeIn 0.6s 1.5s ease forwards; opacity: 0; }

  /* helper */
  .pixel-canvas { image-rendering: pixelated; display: block; }
</style>
</head>

  <!-- ═══════ Thread + Pixel Heart ═══════ -->
  <svg class="thread-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="threadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#5DCAA5" stop-opacity="0"/>
        <stop offset="25%"  stop-color="#5DCAA5" stop-opacity="0.9"/>
        <stop offset="50%"  stop-color="#ffffff" stop-opacity="1"/>
        <stop offset="75%"  stop-color="#D4537E" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#D4537E" stop-opacity="0"/>
      </linearGradient>

      <!-- radial gradient for the heart itself (teal→white→pink, read left-to-right) -->
      <linearGradient id="heartFill" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#ED93B1"/>
        <stop offset="45%"  stop-color="#D4537E"/>
        <stop offset="100%" stop-color="#8A2B4E"/>
      </linearGradient>
      <radialGradient id="heartAura" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stop-color="#D4537E" stop-opacity="0.6"/>
        <stop offset="40%" stop-color="#D4537E" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="#D4537E" stop-opacity="0"/>
      </radialGradient>

      <filter id="heartGlow">
        <feGaussianBlur stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- arc that draws first -->
    <path class="thread-path" d="M230 310 Q500 200 770 310"
      fill="none" stroke="url(#threadGrad)" stroke-width="2.5"/>

    <!-- Soft pink aura behind the heart — appears at 2.8s -->
    <circle class="heart-aura" cx="500" cy="255" r="50" fill="url(#heartAura)"/>

    <!-- ═════ PIXEL HEART (7×6 grid, 4u cells, centered at 500,255) ═════
         bounding box: x 486..514, y 243..267
         heart shape, classic 8-bit pattern:
           .##.##.
           #######
           #######
           .#####.
           ..###..
           ...#...
    ═══════════════════════════════════════════════════════════════════ -->
    <g class="heart" filter="url(#heartGlow)" fill="url(#heartFill)">
