<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenLove — Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#5DCAA5;--teal2:#1D9E75;
  --purple:#7B6FE8;--purple-l:#AFA9EC;
  --pink:#D4537E;--pink-l:#ED93B1;
  --amber:#FAC775;
  --bg:#07070f;--bg2:#0d0d1e;--bg3:#111128;
  --border:#1a1a3a;--muted:#333355;
  --text:#c8c8e8;--dim:#555588;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Press Start 2P',monospace}

/* ── BACKGROUND LAYERS ── */
#stars{position:fixed;inset:0;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--d,3s) infinite var(--dl,0s)}
@keyframes twinkle{
  0%,100%{opacity:var(--lo,.12);transform:scale(1)}
  50%{opacity:var(--hi,.8);transform:scale(1.4)}}

#city{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:flex-end;gap:1px;pointer-events:none}
.bld{background:var(--bg3);flex-shrink:0;position:relative;animation:rise .9s ease-out both}
@keyframes rise{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}
.win{position:absolute;width:3px;height:4px;background:var(--amber);
  animation:wink var(--wd,5s) infinite var(--wdl,0s)}
@keyframes wink{0%,47%,53%,100%{opacity:1}50%{opacity:.05}}

.scan{position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px)}

/* ── MAIN LAYOUT ── */
.stage{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
}

/* ── PHONE CLUSTER ── */
.cluster{
  position:relative;
  width:600px;height:260px;
  flex-shrink:0;
  animation:clusterIn .8s ease both .2s;
}
@keyframes clusterIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.phone{
  position:absolute;top:20px;
  width:140px;height:220px;
  border-radius:14px;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 8px 12px;gap:6px;
}
.phone.her{left:40px;background:var(--bg2);border:2px solid var(--teal);
  box-shadow:0 0 20px #5DCAA525,inset 0 0 20px #5DCAA508}
.phone.him{right:40px;background:var(--bg2);border:2px solid var(--pink);
  box-shadow:0 0 20px #D4537E25,inset 0 0 20px #D4537E08}

.app-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:3px;width:100%;flex-shrink:0;
}
.app-grid div{
  aspect-ratio:1;border-radius:3px;
}

.phone-info{text-align:center;margin-top:2px}
.p-status{font-size:5px;letter-spacing:.5px;margin-bottom:3px}
.phone.her .p-status{color:var(--teal)}
.phone.him .p-status{color:var(--pink-l)}
.p-score{font-size:7px;color:var(--text)}
.p-name{font-size:5px;margin-top:6px;letter-spacing:1px}
.phone.her .p-name{color:var(--teal)}
.phone.him .p-name{color:var(--pink)}

/* ── ARC SVG ── */
.arc{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none}

/* ── ORB ── */
.orb{
  position:absolute;
  left:50%;top:calc(50% + 60px);
  transform:translate(-50%,-50%);
  width:44px;height:44px;
  border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#fff 0%,#dde 40%,#aab 70%,#778 100%);
  box-shadow:0 0 20px #fff6,0 0 50px #fff3,0 0 80px #aaf2;
  animation:orbPop .5s cubic-bezier(.34,1.56,.64,1) both 2.2s;
  transform-origin:center center;
}
@keyframes orbPop{
  from{transform:translate(-50%,-50%) scale(0)}
  to{transform:translate(-50%,-50%) scale(1)}}

/* ── TITLE BLOCK ── */
.title-block{
  text-align:center;
  margin-top:18px;
  animation:titleIn .8s ease both 1.8s;
}
@keyframes titleIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.t-main{
  font-size:clamp(26px,4.5vw,48px);
  color:var(--teal);
  letter-spacing:6px;
  text-shadow:0 0 30px #5DCAA540,0 0 70px #5DCAA520;
}
.t-sub{
  font-size:clamp(6px,1vw,9px);
  color:var(--dim);
  letter-spacing:3px;
  margin-top:12px;
}
.t-tags{
  display:flex;gap:20px;justify-content:center;
  margin-top:14px;
}
.t-tag{
  font-size:clamp(5px,.8vw,7px);
  color:var(--purple-l);
  letter-spacing:1.5px;
}

/* ── CORNERS ── */
.c{position:fixed;width:22px;height:22px;border-color:var(--teal);border-style:solid}
.c-tl{top:16px;left:16px;border-width:2px 0 0 2px}
.c-tr{top:16px;right:16px;border-width:2px 2px 0 0}
.c-bl{bottom:40px;left:16px;border-width:0 0 2px 2px}
.c-br{bottom:40px;right:16px;border-width:0 2px 2px 0}

/* ── NAV ── */
nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;align-items:center;z-index:99}
.nd{width:7px;height:7px;background:var(--muted);cursor:pointer;
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);transition:.3s}
.nd.on{background:var(--teal);transform:scale(1.7)}
.nb{background:none;border:1px solid var(--muted);color:var(--dim);
  font-family:inherit;font-size:8px;padding:5px 12px;cursor:pointer;transition:.3s;
  text-decoration:none;display:flex;align-items:center;letter-spacing:1px}
.nb:hover{border-color:var(--teal);color:var(--teal)}
.nb.off{opacity:.3;pointer-events:none}
.pg{position:fixed;top:16px;right:18px;font-size:7px;color:var(--dim);letter-spacing:2px}
</style>
</head>
<body>
<div id="stars"></div>
<div id="city"></div>
<div class="scan"></div>

<div class="stage">
  <div class="cluster">
    <!-- HER phone -->
    <div class="phone her">
      <div class="app-grid" id="gridHer"></div>
      <div class="phone-info">
        <div class="p-status">TRUSTED</div>
        <div class="p-score">95 / 100</div>
        <div class="p-name">● HER</div>
      </div>
    </div>

    <!-- HIM phone -->
    <div class="phone him">
      <div class="app-grid" id="gridHim"></div>
      <div class="phone-info">
        <div class="p-status">TRUSTED</div>
        <div class="p-score">97 / 100</div>
        <div class="p-name">● HIM</div>
      </div>
    </div>

    <!-- Arc SVG -->
    <svg class="arc" viewBox="0 0 600 260" preserveAspectRatio="none">
      <defs>
        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#5DCAA5" stop-opacity=".8"/>
          <stop offset="50%" stop-color="#aaaacc" stop-opacity=".4"/>
          <stop offset="100%" stop-color="#D4537E" stop-opacity=".8"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <path id="arcPath" d="M 110 130 C 200 240 400 240 490 130"
        stroke="url(#arcGrad)" stroke-width="1.5" fill="none"
        filter="url(#glow)"
        stroke-dasharray="500" stroke-dashoffset="500"/>
    </svg>

    <!-- Orb -->
    <div class="orb"></div>
  </div>

  <!-- Title -->
  <div class="title-block">
    <div class="t-main">OPEN LOVE</div>
    <div class="t-sub">AI-POWERED COUPLE COMMITMENT PROTOCOL</div>
    <div class="t-tags">
      <span class="t-tag">BUILT ON OPENCLAW</span>
      <span class="t-tag">·</span>
      <span class="t-tag">POWERED BY CLAUDE</span>
      <span class="t-tag">·</span>
      <span class="t-tag">SETTLED ON-CHAIN</span>
    </div>
  </div>
</div>

<div class="c c-tl"></div>
<div class="c c-tr"></div>
<div class="c c-bl"></div>
<div class="c c-br"></div>

<nav>
  <span class="nb off">◀ PREV</span>
  <div class="nd on"></div>
  <div class="nd" onclick="location='slide2-capabilities.html'"></div>
  <div class="nd" onclick="location='slide3-architecture.html'"></div>
  <div class="nd" onclick="location='slide4-bond.html'"></div>
  <div class="nd" onclick="location='slide5-diary.html'"></div>
  <div class="nd" onclick="location='slide6-plans.html'"></div>
  <a class="nb" href="slide2-capabilities.html">NEXT ▶</a>
</nav>
<div class="pg">01 / 06</div>

<script>
// App grid colours
const herColors = [
  '#2a8c6a','#3a6ebf','#5DCAA5','#4a5ab0',
  '#1D9E75','#5a4eb0','#5DCAA5','#7B6FE8',
  '#FAC775','#2a8c6a','#3a5c9e','#5DCAA5',
  '#1D9E75','#5a4eb0','#3a6ebf','#7B6FE8',
];
const himColors = [
  '#b03a5a','#7B6FE8','#D4537E','#5a3ab0',
  '#D4537E','#8a3ab0','#ED93B1','#6a4ab0',
  '#FAC775','#b03a5a','#D4537E','#8a3ab0',
  '#ED93B1','#7B6FE8','#b03a5a','#D4537E',
];
const gh = document.getElementById('gridHer');
const gm = document.getElementById('gridHim');
herColors.forEach(c=>{const d=document.createElement('div');d.style.background=c;gh.appendChild(d)});
himColors.forEach(c=>{const d=document.createElement('div');d.style.background=c;gm.appendChild(d)});

// Animate arc
setTimeout(()=>{
  const p = document.getElementById('arcPath');
  p.style.transition='stroke-dashoffset 1.4s ease';
  p.style.strokeDashoffset='0';
}, 900);

// Stars
const sf=document.getElementById('stars');
for(let i=0;i<140;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2.2+.4;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*78}%;left:${Math.random()*100}%;
    --d:${2+Math.random()*4}s;--dl:${Math.random()*6}s;--lo:${.06+Math.random()*.18};--hi:${.5+Math.random()*.5}`;
  sf.appendChild(s);
}

// City — fill full width
const city=document.getElementById('city');
const W=window.innerWidth;
const bh=[42,60,80,55,95,70,45,85,60,100,50,75,90,48,68,82,55,72,38,88,64,100,52,78,44,92,66,58,84,70];
let x=0;
while(x<W+100){
  const h=bh[Math.floor(Math.random()*bh.length)];
  const w=12+Math.floor(Math.random()*20);
  const b=document.createElement('div');b.className='bld';
  b.style.cssText=`width:${w}px;height:${h}px;animation-delay:${Math.random()*.4}s`;
  const rows=Math.floor(h/12),cols=Math.floor(w/6);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(Math.random()>.45){
    const win=document.createElement('div');win.className='win';
    win.style.cssText=`top:${r*12+3}px;left:${c*6+1}px;--wd:${3+Math.random()*6}s;--wdl:${Math.random()*7}s`;
    b.appendChild(win);
  }
  city.appendChild(b);
  x+=w+1;
}
</script>
</body>
</html>
