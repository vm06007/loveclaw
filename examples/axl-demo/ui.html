</head>
<body>
    <div class="topbar">
        <div class="logo">LOVE<span>CLAW</span> · AXL P2P</div>
        <div class="topbar-right">
            <div class="tab-links" id="tab-links">
                open in tabs:
                <a href="?node=alice" target="_blank">alice</a>
                <a href="?node=boris" target="_blank">boris</a>
            </div>
            <div class="conn-pill" id="conn-pill">
                <div class="conn-dot"></div>
                <span id="conn-label">connecting…</span>
            </div>
        </div>
    </div>
    <div class="panels-wrap">
        <!-- offline overlay -->
        <div class="offline-overlay visible" id="offline-banner">
            <div class="empty-icon">◇</div>
            <div class="empty-title">DEMO NOT RUNNING</div>
            <div class="offline-instructions">
                <span class="step-label">TERMINAL — start the demo</span>
                <code>cd loveclaw-hack/examples/axl-demo</code>
                <code>python3 a2a.py</code>
                <code>python3 a2a.py --test&nbsp;&nbsp;&nbsp;# run scripted test first</code>
            </div>
            <div class="offline-footer">listening for a2a.py…</div>
        </div>

        <!-- panels injected by JS -->
        <div id="panels" style="display:flex;flex:1;overflow:hidden;width:100%"></div>
    </div>
    <script src="ui.js"></script>
