<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LoveClaw / 0G Storage</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%2307070f'/%3E%3Crect x='17' y='14' width='5' height='5' fill='%23D4537E'/%3E%3Crect x='22' y='14' width='5' height='5' fill='%23D4537E'/%3E%3Crect x='37' y='14' width='5' height='5' fill='%23D4537E'/%3E%3Crect x='42' y='14' width='5' height='5' fill='%23D4537E'/%3E%3Crect x='12' y='19' width='40' height='5' fill='%23D4537E'/%3E%3Crect x='12' y='24' width='40' height='5' fill='%23D4537E'/%3E%3Crect x='12' y='29' width='40' height='5' fill='%23D4537E'/%3E%3Crect x='17' y='34' width='30' height='5' fill='%23ED93B1'/%3E%3Crect x='22' y='39' width='20' height='5' fill='%23ED93B1'/%3E%3Crect x='27' y='44' width='10' height='5' fill='%23ED93B1'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/pixel-ui.css" />
</head>
<body>
    <div class="topbar">
        <div class="logo">
            LOVE<span>CLAW</span><span class="logo-sep" aria-hidden="true">/</span>0G STORAGE
        </div>
        <div class="topbar-right">
            <div class="conn-pill" id="net-pill">
                <div class="conn-dot"></div>
                <span id="net-label">…</span>
            </div>
        </div>
    </div>
    <div class="lc-wallet-bar" id="wallet-bar" aria-live="polite">
        <span class="lc-wallet-kicker">SIGNER</span>
        <div class="lc-wallet-value" id="wallet-value">…</div>
    </div>
    <div class="lc-scroll">
        <div class="lc-inner lc-page">
            <p class="lc-blurb">
                Local demo on <code>127.0.0.1</code> / signing uses <code>.env.local</code> on the Bun server
                <span id="blurb-signer-wrap"></span>.
                The private key never reaches your browser / only 0G RPC + indexer traffic leaves your machine.
            </p>
            <div class="panel panel-store">
                <div class="panel-head">
                    <div class="panel-head-label">STORE</div>
                </div>
                <div class="lc-panel-body">
                    <div class="lc-field-heading">
                        <label class="field-label" for="storeText">UTF-8 payload</label>
                        <div class="lc-preset-inline" role="group" aria-label="Example payloads">
                            <span class="lc-preset-label">PRESETS</span>
                            <button type="button" class="qbtn" id="presetDiary" title="Fill with a sample diary entry">
                                Diary entry
                            </button>
                            <button type="button" class="qbtn" id="presetLocation" title="Fill with sample coordinates">
                                Location coordinates
                            </button>
                            <button type="button" class="qbtn" id="presetChat" title="Fill with a sample chat thread">
                                Chat entry
                            </button>
                            <button
                                type="button"
                                class="qbtn"
                                disabled
                                aria-disabled="true"
                                title="Binary image payloads will ship in a later demo"
                            >
                                Image (coming soon)
                            </button>
                        </div>
                    </div>
                    <textarea id="storeText" class="lc-textarea" placeholder="Type anything to upload as one blob…"></textarea>
                    <button type="button" class="lc-btn" id="btnStore" disabled>
                        Upload to 0G
                    </button>
                    <div id="storeOut" class="out" hidden></div>
                </div>
            </div>

            <div class="panel panel-retrieve">
                <div class="panel-head">
                    <div class="panel-head-label">RETRIEVE</div>
                </div>
                <div class="lc-panel-body">
                    <label class="field-label" for="rootInput">Root hash</label>
                    <input type="text" id="rootInput" class="lc-input" placeholder="0x…" spellcheck="false" />
                    <button type="button" class="lc-btn" id="btnRetrieve">Download (proof)</button>
                    <div id="retrieveOut" class="out" hidden></div>
                </div>
            </div>
        </div>
    </div>
    <script src="/app.js" defer></script>
</body>
</html>
